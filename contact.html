<!doctype html>
<html>
  <head>
    <!-- Meta Tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Website portfolio template - Get in touch with Raphael Davids for any web development and design"
    />
    <meta name="author" content="Raphael Davids" />

    <!-- Open Graph tags for social sharing -->
    <meta property="og:title" content="Raphael Davids | Contact" />
    <meta
      property="og:description"
      content="Contact Raphael Davids for your next project."
    />
    <meta property="og:type" content="website" />

    <!-- Title, style links, and google font links -->
    <title>Contact</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- These divs are used only for background animation styling of orbs, only three are used to keep inline with the assignment requirements  -->

    <div class="orb-container" aria-hidden="true">
      <div class="orb" aria-hidden="true"></div>
      <div class="orb" aria-hidden="true"></div>
      <div class="orb" aria-hidden="true"></div>
    </div>

    <header>
      <nav aria-label="Main navigation">
        <ul role="list">
          <li><a href="./index.html">Home</a></li>
          <li><a href="./about.html">About</a></li>
          <li><a href="./projects.html">Projects</a></li>
          <!-- prettier-ignore -->
          <li>
            <a href="./contact.html" class="active" aria-current="page">Contact</a>
          </li>
        </ul>
      </nav>
      <h1>Contact Me</h1>
    </header>
    <main>
      <div class="container glass">
        <h2>Get In Touch</h2>

        <form>
          <!-- * required mark hidden for screen readers -->
          <label for="name">
            Name: <span aria-hidden="true" class="required-mark">*</span>
          </label>
          <input
            type="text"
            id="name"
            placeholder="Jhon Doe"
            required
            aria-required="true"
            minlength="2"
          />

          <label for="email">
            Email: <span aria-hidden="true" class="required-mark">*</span>
          </label>
          <input
            type="email"
            id="email"
            placeholder="email@email.com"
            required
            aria-required="true"
          />

          <label for="phone"> Phone: </label>
          <input type="tel" id="phone" placeholder="+27 82 000 000" />

          <label for="project-type">
            Project type:
            <span aria-hidden="true" class="required-mark">*</span>
          </label>
          <select
            id="project-type"
            name="project-type"
            required
            aria-required="true"
          >
            <option value="" disabled selected>Query Type</option>
            <option value="new website">New Website</option>
            <option value="web maintanence">Web Maintanence</option>
            <option value="web changes">Web Changes</option>
            <option value="web app">Web Application</option>
            <option value="e-commerce">e-commerce</option>
            <option value="other">Other</option>
          </select>

          <label for="message"> Message: </label>
          <textarea
            placeholder="Add any additional info here"
            id="message"
            name="message"
          >
          </textarea>

          <button>Send</button>
        </form>
        <img src="./images/contact.jpg" />
      </div>
    </main>
    <footer>
      <p>Raphael Davids &copy; 2026 - Umuzi Capstone Project</p>
      <a href="mailto:raphael.davids@umuzi.org"
        >Contact me at raphael.davids.org</a
      >
      <img src="./images/signature.png" />
    </footer>
  </body>
</html>
